name: Android CI

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - uses: r0adkll/sign-android-release@v1
        name: Sign app APK
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.BASE64KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # Rename APK to match the URL pattern the app expects:
      # releases/download/TAG/AnimeScrap-vTAG.apk
      - name: Rename APK
        run: |
          TAG=${{ github.event.release.tag_name }}
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} AnimeScrap-v${TAG}.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: AnimeScrap-v${{ github.event.release.tag_name }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}